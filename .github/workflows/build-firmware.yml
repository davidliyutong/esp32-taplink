name: build-firmware

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/esp32-taplink.bin dist/
          tar czf dist/esp32-taplink.tar.gz \
              -C build esp32-taplink.bin esp32-taplink.elf

      - uses: actions/upload-artifact@v4
        with:
          name: esp32-taplink
          path: dist/esp32-taplink.*
          retention-days: 30

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/esp32-taplink.*
